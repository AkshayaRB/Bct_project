<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Dashboard - Student Onboarding</title>

<body>
  <div class="container">

      </div>
      <div style="background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 12px;">
