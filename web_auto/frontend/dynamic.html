<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Content - Student Onboarding</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <nav>
      <a href="dashboard.html" id="nav-dashboard">Dashboard</a>
      <a href="form.html" id="nav-form">Data Form</a>
      <a href="dynamic.html" class="active" id="nav-dynamic">Dynamic Content</a>
      <a href="table.html" id="nav-table">Student List</a>
      <a href="#" id="logout-btn" style="margin-left: auto;">Logout</a>
    </nav>
    
    <h1>Dynamic Interactions</h1>
    
    <div style="margin-bottom: 2rem;">
      <h3>Delayed Loading</h3>
      <button id="load-btn" class="btn btn-secondary" style="width: auto; margin-top: 1rem;">Load Content</button>
      <div id="spinner" class="loader" style="display: none; margin-left: 1rem; vertical-align: middle;"></div>
      <div id="dynamic-content" style="margin-top: 1rem; min-height: 40px;"></div>
    </div>

    <div>
      <h3>Modals</h3>
      <button id="open-modal" class="btn btn-secondary" style="width: auto; margin-top: 1rem;">Open Modal</button>
    </div>

  </div>

  <div class="modal-overlay" id="my-modal">
    <div class="modal-content">
      <h2 id="modal-title">Important Notice</h2>
      <p id="modal-body" style="margin-bottom: 1.5rem;">This is a modal popup. Please acknowledge the information.</p>
      <button id="close-modal" class="btn">Acknowledge</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
