<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Student Onboarding</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container login-container">
    <h1>Welcome Back</h1>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Please sign in to your account</p>
    
    <div class="success-message" style="display: none;"></div>
    
    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" data-test="username-input" placeholder="testuser">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" data-test="password-input" placeholder="testpass">
        <div class="error-message">Invalid credentials.</div>
      </div>
      <button type="submit" id="login-button" class="btn" data-test="login-submit">Sign In</button>
    </form>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
